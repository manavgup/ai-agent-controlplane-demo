# The demo stack: gateway (SQLite) + OPA + 6 MCP servers + 2 A2A agents (10 services).
# (A heavier Postgres/Redis/nginx/Phoenix-OTEL "full" profile is future work, not in this release.)
name: ai-agent-controlplane-demo

services:
  gateway:
    # Pinned ContextForge v1.0.2 with our config + FinByteGuard baked in
    # (gateway/Dockerfile). No host bind-mounts → runs from any clone path,
    # including ones Docker can't share (e.g. /tmp on macOS).
    build: ./gateway
    # `.env` is intentionally NOT committed (see .env.example). `required: false`
    # lets `docker compose config` / CI validate the file when `.env` is absent,
    # while still loading it for real runs (`make up`) when present.
    env_file:
      - path: .env
        required: false
    environment:
      HOST: 0.0.0.0
      PORT: "4444"
      DATABASE_URL: sqlite:////tmp/mcp.db
      MCPGATEWAY_A2A_ENABLED: "true"
      AUTH_REQUIRED: "true"
      # Local HTTP demo: the CSRF cookie is Secure-flagged (HTTPS-only), so the
      # Admin UI's state-changing actions (e.g. "Refresh tools") fail CSRF over
      # http://localhost. Disable for the demo; keep enabled behind HTTPS in prod.
      CSRF_ENABLED: "false"
      # SSRF: the gateway calls backends by Compose service name (private IPs)
      SSRF_ALLOW_PRIVATE_NETWORKS: "true"
      SSRF_ALLOW_LOCALHOST: "true"
      # Plugins
      PLUGINS_ENABLED: "true"
      PLUGIN_CONFIG_FILE: /app/plugins/config.yaml
    ports:
      - "4444:4444"
    depends_on:
      - opa
    restart: unless-stopped

  opa:
    # Rego policies baked in (gateway/Dockerfile.opa) — no host bind-mount.
    build:
      context: ./gateway
      dockerfile: Dockerfile.opa
    command: ["run", "--server", "--addr=0.0.0.0:8181", "--log-level=info", "--set=decision_logs.console=true", "/policies"]
    restart: unless-stopped

  expense-db:
    build: ./mcp-servers/expense-db
    restart: unless-stopped
  corpus:
    build: ./mcp-servers/corpus
    ports:
      - "8010:8000"   # host port so the Companion can POST notes to /set
    restart: unless-stopped
  erp-payments:
    build: ./mcp-servers/erp-payments
    restart: unless-stopped
  policy-docs:
    build: ./mcp-servers/policy-docs
    restart: unless-stopped
  notify:
    build: ./mcp-servers/notify
    restart: unless-stopped

  # Operator surface: exposes ContextForge's own management + observability as
  # MCP tools, for Bob's privileged "platform operator" persona (register a new
  # MCP server, list the catalog, read the audit trail, interrogate OPA).
  controlplane:
    build: ./mcp-servers/controlplane
    environment:
      GATEWAY_URL: http://gateway:4444
      GATEWAY_TOKEN: ${AUDITOR_TOKEN:-}   # admin token written to .env.tokens by `make up`
      OPA_URL: http://opa:8181
    depends_on:
      - gateway
      - opa
    restart: unless-stopped

  # Runs but is intentionally NOT registered by the seed, so the operator demo
  # can show Bob registering a brand-new MCP server into ContextForge live.
  fx-rates:
    build: ./mcp-servers/fx-rates
    restart: unless-stopped

  auditor:
    build: ./a2a-agents/auditor
    environment:
      GATEWAY_URL: http://gateway:4444
      GATEWAY_TOKEN: ${AUDITOR_TOKEN:-}
    ports:
      - "9001:9001"   # exposed so the A2A inspector (a2aproject/a2a-inspector) can reach it
    depends_on:
      - gateway
    restart: unless-stopped

  payments:
    build: ./a2a-agents/payments
    ports:
      - "3000:3000"   # exposed for the A2A inspector
    restart: unless-stopped

  chair:
    build: ./a2a-agents/chair
    environment:
      GATEWAY_URL: http://gateway:4444
      GATEWAY_TOKEN: ${AUDITOR_TOKEN:-}
    ports:
      - "9200:8000"   # exposed for the A2A inspector + a host health probe
    depends_on:
      - gateway
    restart: unless-stopped

  room-agent:
    build: ./a2a-agents/room
    ports:
      - "9100:8000"   # exposed for the A2A inspector + a host health probe
    restart: unless-stopped
