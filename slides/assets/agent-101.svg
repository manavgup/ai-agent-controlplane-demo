<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 660"
     font-family="'IBM Plex Sans',-apple-system,'Segoe UI',Roboto,Arial,sans-serif">
  <defs>
    <linearGradient id="hub" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F62FE"/>
      <stop offset="1" stop-color="#6929C4"/>
    </linearGradient>
    <filter id="sh" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="7" flood-color="#0B122B" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- connectors (behind everything) -->
  <g stroke="#C3CDDF" stroke-width="2.5" stroke-linecap="round">
    <line x1="500" y1="330" x2="500" y2="95"/>
    <line x1="500" y1="330" x2="742" y2="261"/>
    <line x1="500" y1="330" x2="650" y2="536"/>
    <line x1="500" y1="330" x2="350" y2="536"/>
    <line x1="500" y1="330" x2="258" y2="261"/>
  </g>

  <!-- center hub: the agent -->
  <g filter="url(#sh)">
    <rect x="388" y="262" width="224" height="138" rx="22" fill="url(#hub)"/>
  </g>
  <text x="500" y="322" text-anchor="middle" font-size="35" font-weight="800" fill="#FFFFFF" letter-spacing="1.5">AGENT</text>
  <text x="500" y="356" text-anchor="middle" font-size="15.5" fill="#E8EEFB">the LLM &#8220;brain&#8221;</text>

  <!-- ===== trait cards ===== -->
  <!-- top: Reasoning (IBM blue) -->
  <g filter="url(#sh)"><rect x="385" y="51" width="230" height="88" rx="16" fill="#FFFFFF" stroke="#E3E8F0" stroke-width="1.5"/></g>
  <circle cx="429" cy="95" r="23" fill="#E5EEFF"/>
  <text x="429" y="104" text-anchor="middle" font-size="24">&#129504;</text>
  <text x="466" y="89" font-size="19" font-weight="700" fill="#161616">Reasoning</text>
  <text x="466" y="112" font-size="13" fill="#5A6476">plans the next step</text>

  <!-- right: Tools & actions (green) -->
  <g filter="url(#sh)"><rect x="627" y="217" width="230" height="88" rx="16" fill="#FFFFFF" stroke="#E3E8F0" stroke-width="1.5"/></g>
  <circle cx="671" cy="261" r="23" fill="#DBF3E3"/>
  <text x="671" y="270" text-anchor="middle" font-size="24">&#128296;</text>
  <text x="708" y="255" font-size="19" font-weight="700" fill="#161616">Tools &amp; actions</text>
  <text x="708" y="278" font-size="13" fill="#5A6476">executes real tasks</text>

  <!-- bottom-right: Autonomy (gold) -->
  <g filter="url(#sh)"><rect x="535" y="492" width="230" height="88" rx="16" fill="#FFFFFF" stroke="#E3E8F0" stroke-width="1.5"/></g>
  <circle cx="579" cy="536" r="23" fill="#FBEFC9"/>
  <text x="579" y="545" text-anchor="middle" font-size="24">&#127919;</text>
  <text x="616" y="530" font-size="19" font-weight="700" fill="#161616">Autonomy</text>
  <text x="616" y="553" font-size="13" fill="#5A6476">pursues a goal on its own</text>

  <!-- bottom-left: Memory (purple) -->
  <g filter="url(#sh)"><rect x="235" y="492" width="230" height="88" rx="16" fill="#FFFFFF" stroke="#E3E8F0" stroke-width="1.5"/></g>
  <circle cx="279" cy="536" r="23" fill="#EBE0FF"/>
  <text x="279" y="545" text-anchor="middle" font-size="24">&#128190;</text>
  <text x="316" y="530" font-size="19" font-weight="700" fill="#161616">Memory</text>
  <text x="316" y="553" font-size="13" fill="#5A6476">context now + recall later</text>

  <!-- left: Knowledge (teal) -->
  <g filter="url(#sh)"><rect x="143" y="217" width="230" height="88" rx="16" fill="#FFFFFF" stroke="#E3E8F0" stroke-width="1.5"/></g>
  <circle cx="187" cy="261" r="23" fill="#CFEFEC"/>
  <text x="187" y="270" text-anchor="middle" font-size="24">&#128218;</text>
  <text x="224" y="255" font-size="19" font-weight="700" fill="#161616">Knowledge</text>
  <text x="224" y="278" font-size="13" fill="#5A6476">grounding &amp; retrieval</text>
</svg>
