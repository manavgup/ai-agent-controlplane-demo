# FinByte demo plugin config — mounted over /app/plugins/config.yaml.
# Controls (all real ContextForge plugins on the cpex framework):
#   FinByteGuard (custom)  -> tool_pre_invoke: OPA-backed wire amount cap  (shot #1)
#                          -> tool_post_invoke: redact secret + injection  (shots #2/#3)
#   PIIFilterPlugin (cpex) -> tool_post_invoke: mask SSN + credit card     (shot #2)
# (RBAC + rate-limit = core gateway features, not plugins -> shot #4.)

plugin_dirs:
  - "plugins/native"
  - "plugins/custom"
  - "/etc/mcpgateway/plugins"

plugin_settings:
  parallel_execution_within_band: true
  plugin_timeout: 120
  fail_on_plugin_error: false
  enable_plugin_api: true
  plugin_health_check_interval: 120
  include_user_info: false

plugins:
  # ── Shot #1: OPA-backed wire amount cap (reads real args, asks OPA/Rego) ──
  - name: "FinByteGuard"
    kind: "finbyte_guard.FinByteGuard"
    description: "OPA-backed wire amount cap + output sanitization"
    version: "0.1.0"
    author: "finbyte-demo"
    hooks: ["tool_pre_invoke", "tool_post_invoke"]
    tags: ["security", "policy", "opa", "secrets", "injection"]
    mode: "sequential"
    priority: 20
    conditions: []
    config:
      opa_url: "http://opa:8181"
      policy_path: "mcpgateway"

  # ── Shot #2: PII masking on tool output (SSN + credit card) ──
  - name: "PIIFilterPlugin"
    kind: "cpex_pii_filter.PIIFilterPlugin"
    description: "Detects and masks PII in tool output"
    version: "0.2.0"
    author: "finbyte-demo"
    hooks: ["tool_post_invoke"]
    tags: ["security", "pii", "compliance"]
    mode: "enforce"
    priority: 50
    conditions:
      - prompts: []
        server_ids: []
        tenant_ids: []
    config:
      detect_ssn: true
      detect_credit_card: true
      detect_email: false
      detect_phone: false
      detect_ip_address: false
      default_mask_strategy: "partial"
      redaction_text: "[PII_REDACTED]"
      block_on_detection: false
      log_detections: true
      include_detection_details: true
      whitelist_patterns:
        - "test@example.com"
